# DataDeepRL Default Configuration
# ==================================

# Data Settings
data:
  data_dir: "./coreData"
  max_files: 100
  sequence_length: 100
  train_ratio: 0.7
  val_ratio: 0.15

# Environment Settings
environment:
  initial_balance: 100000.0
  transaction_fee: 0.0  # Percentage fee (0.001 = 0.1%)
  flat_fee: 1.0  # Flat fee per trade in USDT ($1)
  max_position: 1.0
  reward_scaling: 1.0

# Training Settings
training:
  total_steps: 1000000
  seed: 42
  device: "auto"  # cuda/cpu/auto

# SAC Hyperparameters
sac:
  learning_rate: 0.00007
  gamma: 0.98
  tau: 0.01
  alpha: 0.2
  auto_alpha: true
  batch_size: 512
  buffer_size: 1000000
  hidden_dims: [256, 256]

# PPO Hyperparameters
ppo:
  learning_rate: 0.00005
  gamma: 0.98
  gae_lambda: 0.99
  clip_epsilon: 0.2
  value_coef: 0.25
  entropy_coef: 0.003
  max_grad_norm: 0.5
  n_epochs: 14
  n_steps: 512
  batch_size: 64
  hidden_dims: [256, 256]

# DeepLOB Settings
deeplob:
  hidden_dim: 64
  lstm_hidden: 64
  num_layers: 2
  dropout: 0.1

# Evaluation Settings  
evaluation:
  eval_freq: 10000
  n_eval_episodes: 5

# Logging Settings
logging:
  log_dir: "./logs"
  log_interval: 1000
  save_freq: 50000
  use_tensorboard: true
